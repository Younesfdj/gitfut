# Dagger workspace configuration
# Install modules with: dagger mod install <module>
# Example:
#   dagger mod install github.com/dagger/dagger/modules/wolfi

# Run generators as part of 'dagger check' and fail when generated files are
# stale. Set to false to skip them by default (like 'dagger check --no-generate').
check-generated = true

[modules.go-sdk]
source = "github.com/dagger/go-sdk"

# Marker filename that skips generate when found at or above a Go SDK module root.
# settings.skipGenerateFilename = ""

[modules.gitfut]
source = ".dagger/modules/gitfut"
entrypoint = true

[modules.go-sdk.as-sdk]
name = "go"

[[modules.go-sdk.as-sdk.modules]]
path = ".dagger/modules/gitfut"
